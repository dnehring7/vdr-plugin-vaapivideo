# SPDX-License-Identifier: AGPL-3.0-or-later
# Build Fedora 44 RPMs and Debian 13 (Trixie) DEBs, attach them to the GitHub
# release, and publish DNF / APT repositories via GitHub Pages.
#
# Prerequisites:
#   Enable GitHub Pages (Settings → Pages → Source: Deploy from a branch → gh-pages)
#   Add repository secret: GPG_PRIVATE_KEY (armored private key, no passphrase)

name: Build & Publish Packages

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ================================================================
  # Fedora 44 – RPM
  # ================================================================
  fedora:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    outputs:
      version: ${{ steps.ver.outputs.V }}

    steps:
      - name: Install prerequisites
        run: >
          dnf install -y
          git
          gnupg2
          rpm-build
          rpm-sign
          rpmdevtools
          createrepo_c
          dnf-plugins-core
          https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="${HOME}/.gnupg"
          mkdir -p -m 700 "${GNUPGHOME}"
          printf 'allow-loopback-pinentry\n' > "${GNUPGHOME}/gpg-agent.conf"
          printf 'pinentry-mode loopback\n'  > "${GNUPGHOME}/gpg.conf"
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --pinentry-mode loopback \
            --passphrase '' --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null \
            | awk '/^sec/{print $2}' | cut -d/ -f2 | head -1)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "${GITHUB_ENV}"
          cat >> ~/.rpmmacros <<MACROS
          %_gpg_name ${GPG_KEY_ID}
          %__gpg_sign_cmd %{__gpg} gpg --batch --pinentry-mode loopback \
            --passphrase '' --no-armor %{?_gpg_digest_algo:--digest-algo %{_gpg_digest_algo}} \
            --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} \
            --digest-algo sha256 %{__plaintext_filename}
          MACROS

      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match vX.Y.Z"
            exit 1
          fi

      - name: Derive version from tag
        id: ver
        run: echo "V=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Patch spec version
        run: |
          sed -i "s/^Version:.*/Version:        ${{ steps.ver.outputs.V }}/" \
            vdr-vaapivideo.spec

      - name: Install build dependencies
        run: dnf builddep -y vdr-vaapivideo.spec

      - name: Prepare sources
        run: |
          rpmdev-setuptree
          VERSION="${{ steps.ver.outputs.V }}"
          git archive --format=tar.gz \
            --prefix="vdr-plugin-vaapivideo-${VERSION}/" \
            HEAD \
            -o "${HOME}/rpmbuild/SOURCES/vdr-vaapivideo-${VERSION}.tar.gz"
          cp vdr-vaapivideo.spec "${HOME}/rpmbuild/SPECS/"

      - name: Build RPMs
        run: rpmbuild -ba "${HOME}/rpmbuild/SPECS/vdr-vaapivideo.spec"

      - name: Sign RPMs
        run: |
          rpm --addsign "${HOME}"/rpmbuild/RPMS/x86_64/*.rpm \
                        "${HOME}"/rpmbuild/SRPMS/*.rpm

      - name: Create repository metadata
        run: |
          mkdir -p repo/44/x86_64
          cp "${HOME}"/rpmbuild/RPMS/x86_64/*.rpm repo/44/x86_64/
          createrepo_c repo/44/x86_64/
          gpg --batch --pinentry-mode loopback --passphrase '' \
            --detach-sign --armor repo/44/x86_64/repodata/repomd.xml
          cp gpg/vaapivideo.asc repo/44/RPM-GPG-KEY-vaapivideo

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora-repo
          path: repo/

      - name: Upload RPMs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /root/rpmbuild/RPMS/x86_64/*.rpm
            /root/rpmbuild/SRPMS/*.rpm

  # ================================================================
  # Debian 13 (Trixie) – DEB
  # ================================================================
  debian:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates gpg gpg-agent

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="${HOME}/.gnupg"
          mkdir -p -m 700 "${GNUPGHOME}"
          printf 'allow-loopback-pinentry\n' > "${GNUPGHOME}/gpg-agent.conf"
          printf 'pinentry-mode loopback\n'  > "${GNUPGHOME}/gpg.conf"
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --pinentry-mode loopback \
            --passphrase '' --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null \
            | awk '/^sec/{print $2}' | cut -d/ -f2 | head -1)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match vX.Y.Z"
            exit 1
          fi

      - name: Derive version from tag
        id: ver
        run: echo "V=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Generate debian/changelog
        run: |
          VERSION="${{ steps.ver.outputs.V }}"
          cat > debian/changelog <<EOF
          vdr-plugin-vaapivideo (${VERSION}) trixie; urgency=medium

            * Release ${VERSION}

           -- Dirk Nehring <dnehring@gmx.net>  $(date -R)
          EOF

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            build-essential debhelper fakeroot dpkg-dev apt-utils \
            vdr-dev \
            libavcodec-dev libavfilter-dev libavformat-dev \
            libavutil-dev libswresample-dev \
            libdrm-dev libva-dev libasound2-dev

      - name: Build packages
        run: |
          chmod +x debian/rules
          dpkg-buildpackage -us -uc -b

      - name: Create repository metadata
        run: |
          mkdir -p repo
          cp ../*.deb repo/
          cd repo
          dpkg-scanpackages --arch amd64 . > Packages
          gzip -k Packages
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="vdr-plugin-vaapivideo" \
            -o APT::FTPArchive::Release::Label="vdr-plugin-vaapivideo" \
            -o APT::FTPArchive::Release::Suite="trixie" \
            -o APT::FTPArchive::Release::Codename="trixie" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            release . > Release
          gpg --batch --pinentry-mode loopback --passphrase '' \
            --detach-sign --armor -o Release.gpg Release
          gpg --batch --pinentry-mode loopback --passphrase '' \
            --clearsign -o InRelease Release

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-repo
          path: repo/

      - name: Upload DEBs to release
        uses: softprops/action-gh-release@v2
        with:
          files: repo/*.deb

  # ================================================================
  # Publish package repositories to GitHub Pages
  # ================================================================
  publish:
    needs: [fedora, debian]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Fedora repository
        uses: actions/download-artifact@v4
        with:
          name: fedora-repo
          path: site/fedora/

      - name: Download Debian repository
        uses: actions/download-artifact@v4
        with:
          name: debian-repo
          path: site/debian/

      - name: Generate repo config and landing page
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          VERSION: ${{ needs.fedora.outputs.version }}
        run: |
          # --- Fedora DNF .repo file ---
          cat > site/fedora/44/vdr-vaapivideo.repo <<REPO
          [vdr-vaapivideo]
          name=VDR VAAPI Video Plugin for Fedora 44
          baseurl=${PAGES_URL}/fedora/44/x86_64/
          enabled=1
          gpgcheck=1
          gpgkey=https://github.com/${{ github.repository_owner }}.gpg
          repo_gpgcheck=1
          REPO

          # --- Debian sources.list (DEB822 format) ---
          cat > site/debian/vdr-vaapivideo.sources <<SOURCES
          Types: deb
          URIs: ${PAGES_URL}/debian/
          Suites: ./
          Signed-By: /usr/share/keyrings/dnehring7.gpg
          Architectures: amd64
          SOURCES

          # --- landing page ---
          cat > site/index.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>vdr-plugin-vaapivideo packages</title></head>
          <body>
          <h1>vdr-plugin-vaapivideo ${VERSION}</h1>

          <h2>Fedora 44 (x86_64)</h2>
          <pre>
          sudo dnf config-manager addrepo \\
            --from-repofile=${PAGES_URL}/fedora/44/vdr-vaapivideo.repo
          sudo dnf install vdr-vaapivideo
          </pre>

          <h2>Debian 13 / Trixie (amd64)</h2>
          <pre>
          curl -fsSL https://github.com/${{ github.repository_owner }}.gpg \\
            | sudo gpg --dearmor -o /usr/share/keyrings/dnehring7.gpg
          sudo curl -fsSL ${PAGES_URL}/debian/vdr-vaapivideo.sources \\
            -o /etc/apt/sources.list.d/vdr-vaapivideo.sources
          sudo apt update
          sudo apt install vdr-plugin-vaapivideo
          </pre>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages
        env:
          VERSION: ${{ needs.fedora.outputs.version }}
        run: |
          cd site
          git init -b gh-pages
          git add .
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -m "Update packages for v${VERSION}"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            gh-pages
