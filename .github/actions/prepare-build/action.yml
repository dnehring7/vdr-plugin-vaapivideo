# Validate vX.Y.Z tag and export V (= tag without leading "v") to
# $GITHUB_ENV/$GITHUB_OUTPUT. GPG handling is done by the standard
# crazy-max/ghaction-import-gpg action in the workflow itself.

name: Prepare build
description: Validate vX.Y.Z tag and export the version

inputs:
  tag:
    description: 'Git tag (vX.Y.Z)'
    required: true

outputs:
  version:
    description: 'Version without leading "v"'
    value: ${{ steps.init.outputs.V }}

runs:
  using: composite
  steps:
    - id: init
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: |
        [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
          || { echo "::error::Tag '${TAG}' does not match vX.Y.Z"; exit 1; }
        echo "V=${TAG#v}" | tee -a "${GITHUB_OUTPUT}" "${GITHUB_ENV}" >/dev/null
